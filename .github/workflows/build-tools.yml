name: Build Tools (Linux arm64)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build krkr2 CLI tools (arm64)
    # Free public arm64 runner (Ubuntu 24.04). Matches Android arm64-v8a
    # so produced binaries can also run inside the Operit/Termux shell on
    # the device under test.
    runs-on: ubuntu-24.04-arm
    # vcpkg builds cocos2dx + opencv + ffmpeg + libgdiplus from source on
    # arm64. First run easily takes 90+ minutes; cached runs are minutes.
    timeout-minutes: 360
    env:
      VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
      # Pin VCPKG_FORCE_SYSTEM_BINARIES=1 so vcpkg-tool builds itself with
      # the host gcc/cmake instead of trying to download a prebuilt amd64
      # binary that wouldn't run on arm64.
      VCPKG_FORCE_SYSTEM_BINARIES: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # ── System deps ──
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bison ninja-build python3 nasm pkg-config build-essential \
            autoconf automake libtool libltdl-dev curl zip unzip tar \
            gettext intltool libfreetype-dev \
            libxft-dev libxext-dev libxxf86vm-dev libx11-dev libxmu-dev \
            libxrender-dev libxrandr-dev libxinerama-dev libxcursor-dev \
            libxi-dev libxss-dev libxtst-dev libxkbcommon-dev libxv-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shm0-dev \
            libglu1-mesa-dev libgl2ps-dev libegl1-mesa-dev libwayland-dev \
            libpng-dev libjpeg-dev libcairo2-dev libgif-dev libtiff-dev \
            libcurl4-gnutls-dev libfontconfig1-dev libsqlite3-dev \
            libssl-dev libgtk-3-dev libglew-dev libzip-dev \
            libasound2-dev libpulse-dev libdbus-1-dev libudev-dev \
            libpango1.0-dev libgdk-pixbuf-2.0-dev

      # ── vcpkg (full clone — vcpkg.json pins a specific baseline commit
      #   that requires history beyond depth=1). ──
      - name: Setup vcpkg
        run: |
          mkdir -p "${VCPKG_DEFAULT_BINARY_CACHE}"
          if [ ! -d "${VCPKG_ROOT}/.git" ]; then
            git clone https://github.com/microsoft/vcpkg.git "${VCPKG_ROOT}"
          fi
          "${VCPKG_ROOT}/bootstrap-vcpkg.sh" -disableMetrics
          "${VCPKG_ROOT}/vcpkg" version

      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-tools-linux-arm64-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}-v1
          restore-keys: |
            vcpkg-tools-linux-arm64-

      # ── ccache for the actual C++ compile ──
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.18
        with:
          key: build-tools-linux-arm64

      # ── Configure ──
      - name: Configure (Release, tools only)
        run: |
          cmake -S . -B out/linux \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
            -DENABLE_TESTS=OFF \
            -DBUILD_TOOLS=ON \
            -DBUILD_TOOLS_ONLY=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      # ── Replace cocos2dx's amd64 prebuilt libfmod.so with an arm64
      #   stub so the link step doesn't choke on "file in wrong format".
      #   The CLI tools (xp3 / xp3pack / tjsdump / ksdec / mtndump /
      #   motionsim) never call into FMOD at runtime; cocos2dx just
      #   requires the .so on the link line via its package config.
      #   ld rejects the upstream prebuilt because it's an x86_64 ELF
      #   on an arm64 link line — so we ship an empty arm64 .so in its
      #   place. If the static libs do reference any FMOD_* symbols at
      #   link time we'll add concrete no-op definitions in a follow-up.
      - name: Stub amd64 libfmod.so → arm64 no-op
        run: |
          set -e
          FMOD_DIR="$(find out/linux/vcpkg_installed -type d -path '*/cocos2dx/linux-specific/fmod/prebuilt/64-bit' | head -1)"
          if [ -z "$FMOD_DIR" ]; then
            echo "no fmod prebuilt dir found, skipping"
            exit 0
          fi
          echo "fmod prebuilt dir: $FMOD_DIR"
          file "$FMOD_DIR/libfmod.so" || true

          mkdir -p stub_fmod
          printf 'extern "C" void __fmod_stub_placeholder(void) {}\n' > stub_fmod/fmod_stub.cpp

          # Discover every FMOD-shaped undefined symbol pulled in by the
          # static libs cmake will throw at the linker. C symbols become
          # int FOO() {return 0;}; mangled C++ symbols use an asm label so
          # we can emit them under their exact post-mangling name without
          # fighting the C++ name mangler.
          STATIC_LIBS="$(find out/linux/vcpkg_installed/arm64-linux/lib -name '*.a' 2>/dev/null) $(find out/linux -name 'libcore_*.a' -o -name 'libtjs2.a' -o -name 'libkrkr2plugins_ncbind.a' 2>/dev/null)"
          {
            nm --undefined-only --no-demangle $STATIC_LIBS 2>/dev/null \
              | awk '{print $NF}' \
              | grep -E '^(FMOD_|_ZN4FMOD|_ZNK4FMOD|FMODGUID)' \
              | sort -u
          } > stub_fmod/symbols.txt || true
          echo "---- needed FMOD symbols ----"
          wc -l stub_fmod/symbols.txt
          head -40 stub_fmod/symbols.txt || true

          idx=0
          while read -r sym; do
            [ -z "$sym" ] && continue
            idx=$((idx+1))
            if [ "${sym#_Z}" != "$sym" ]; then
              # mangled C++ — alias via asm label
              echo "extern \"C\" void __fmod_stub_$idx(void) __asm__(\"$sym\");" >> stub_fmod/fmod_stub.cpp
              echo "void __fmod_stub_$idx(void) {}" >> stub_fmod/fmod_stub.cpp
            else
              # plain C symbol (FMOD_*)
              echo "extern \"C\" int $sym() { return 0; }" >> stub_fmod/fmod_stub.cpp
            fi
          done < stub_fmod/symbols.txt

          c++ -O2 -fPIC -shared -o stub_fmod/libfmod.so stub_fmod/fmod_stub.cpp
          file stub_fmod/libfmod.so
          mv "$FMOD_DIR/libfmod.so" "$FMOD_DIR/libfmod.so.amd64.bak" || true
          cp stub_fmod/libfmod.so "$FMOD_DIR/libfmod.so"
          file "$FMOD_DIR/libfmod.so"

      # ── Build (CLI tools only) ──
      - name: Build CLI tool targets
        run: |
          cmake --build out/linux \
            --target xp3 xp3pack tjsdump ksdec mtndump motionsim \
            -j

      # ── Smoke test ──
      - name: Smoke test binaries
        run: |
          set -e
          for bin in xp3 xp3pack tjsdump ksdec mtndump motionsim; do
            echo "::group::$bin --help"
            path="$(find out/linux -type f -executable -name "$bin" | head -1)"
            echo "executable: $path"
            file "$path" || true
            "$path" --help || "$path" -h || true
            echo "::endgroup::"
          done

      # ── Stage release artifacts ──
      - name: Stage artifacts
        run: |
          mkdir -p dist/krkr2-tools-linux-arm64
          for bin in xp3 xp3pack tjsdump ksdec mtndump motionsim; do
            path="$(find out/linux -type f -executable -name "$bin" | head -1)"
            if [ -n "$path" ]; then
              cp "$path" "dist/krkr2-tools-linux-arm64/"
              strip "dist/krkr2-tools-linux-arm64/$bin" || true
            fi
          done
          cp README.md dist/krkr2-tools-linux-arm64/ || true
          ls -la dist/krkr2-tools-linux-arm64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: krkr2-tools-linux-arm64
          path: dist/krkr2-tools-linux-arm64/
          if-no-files-found: error
          retention-days: 30