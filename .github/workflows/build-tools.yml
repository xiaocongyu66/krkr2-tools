name: Build Tools (Linux x64)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: clear;x-gha,readwrite

jobs:
  build:
    name: Build krkr2 CLI tools
    runs-on: ubuntu-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # ── System deps ──
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bison ninja-build python3 nasm pkg-config build-essential \
            autoconf automake libtool libltdl-dev \
            libxft-dev libxext-dev libxxf86vm-dev libx11-dev libxmu-dev \
            libglu1-mesa-dev libgl2ps-dev libxi-dev \
            libpng-dev libcurl4-gnutls-dev libfontconfig1-dev libsqlite3-dev \
            libssl-dev libgtk-3-dev libglew-dev libzip-dev

      # ── vcpkg (with binary caching to GHA) ──
      - name: Export GitHub Actions cache env for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        run: |
          mkdir -p "${VCPKG_DEFAULT_BINARY_CACHE}"
          if [ ! -d "${VCPKG_ROOT}" ]; then
            git clone --depth=1 https://github.com/microsoft/vcpkg.git "${VCPKG_ROOT}"
            "${VCPKG_ROOT}/bootstrap-vcpkg.sh" -disableMetrics
          fi

      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-tools-linux-${{ hashFiles('vcpkg.json') }}-v1
          restore-keys: |
            vcpkg-tools-linux-

      # ── ccache for the actual C++ compile ──
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.18
        with:
          key: build-tools-linux

      # ── Configure ──
      - name: Configure (Release, tools only)
        run: |
          cmake -S . -B out/linux \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
            -DENABLE_TESTS=OFF \
            -DBUILD_TOOLS=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      # ── Build (CLI tools only) ──
      - name: Build CLI tool targets
        run: |
          # Build only the CLI tool binaries — skip the GUI / cocos / bullet
          # heavy targets that aren't needed for command-line tooling.
          cmake --build out/linux \
            --target xp3 xp3pack tjsdump ksdec mtndump motionsim \
            -j

      # ── Smoke test: each binary should at least print its --help ──
      - name: Smoke test binaries
        run: |
          set -e
          for bin in xp3 xp3pack tjsdump ksdec mtndump motionsim; do
            echo "::group::$bin --help"
            path="out/linux/tools/${bin}/${bin}"
            if [ ! -x "$path" ]; then
              # locate it anyway in case CMake places it elsewhere
              path="$(find out/linux -type f -executable -name "$bin" | head -1)"
            fi
            echo "executable: $path"
            "$path" --help || "$path" -h || true
            echo "::endgroup::"
          done

      # ── Stage release artifacts ──
      - name: Stage artifacts
        run: |
          mkdir -p dist/krkr2-tools-linux-x64
          for bin in xp3 xp3pack tjsdump ksdec mtndump motionsim; do
            path="$(find out/linux -type f -executable -name "$bin" | head -1)"
            if [ -n "$path" ]; then
              cp "$path" "dist/krkr2-tools-linux-x64/"
              strip "dist/krkr2-tools-linux-x64/$bin" || true
            fi
          done
          cp README.md dist/krkr2-tools-linux-x64/ || true
          ls -la dist/krkr2-tools-linux-x64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: krkr2-tools-linux-x64
          path: dist/krkr2-tools-linux-x64/
          if-no-files-found: error
          retention-days: 30
